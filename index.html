<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WZXU RADIO</title>
  <meta
    name="description"
    content="WZXU RADIO."
  />
  <link rel="preconnect" href="https://www.youtube.com" />
  <link rel="preconnect" href="https://i.ytimg.com" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <button
    id="artworkOpenBtn"
    class="artwork-open-btn"
    type="button"
    aria-controls="artworkViewer"
    aria-expanded="false"
  >
    View Artwork
  </button>

  <main class="site-shell">
    <section class="hero" aria-labelledby="site-title">
      <div class="hero-copy">
        <!-- Brand text: replace this title anywhere you want to rename the project. -->
        <p class="eyebrow">Independent signal</p>
        <h1 id="site-title">WZXU RADIO</h1>

        <!-- Tagline: replace this line to change the hero tagline. -->
        <p class="tagline">Music from the Underground</p>
      </div>
      <div class="mobile-story-art" aria-hidden="true"></div>
    </section>

    <section class="player-panel media-player" id="mediaPlayer" aria-labelledby="player-title">
      <div class="media-sheen" aria-hidden="true"></div>
      <div class="player-copy">
        <p class="section-kicker" id="playerState">Now Playing</p>
        <h2 id="player-title">The One and All</h2>
        <p id="trackTitle">Music Playing</p>
        <p id="trackDetail">WZXU RADIO streaming playlist</p>
      </div>

      <div class="visualizer" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>

      <div class="controls" aria-label="Playlist controls">
        <button id="prevBtn" class="icon-btn media-control" type="button" aria-label="Previous track">
          <span>|&lt;</span>
        </button>
        <button id="playPauseBtn" class="play-btn media-play" type="button" aria-label="Play playlist">
          <span>Play</span>
        </button>
        <button id="nextBtn" class="icon-btn media-control" type="button" aria-label="Next track">
          <span>&gt;|</span>
        </button>
      </div>

      <div class="playlist-tabs sr-only" id="playlistTabs" aria-label="Choose playlist"></div>

      <div class="playlist-wrap sr-only" aria-hidden="true">
        <div class="playlist-heading">
          <p>Playlist</p>
          <span id="playlistCount">0 tracks</span>
        </div>
        <ol id="playlist" class="playlist" aria-label="YouTube playlist tracks">
          <li class="playlist-empty">Waiting for playlist data.</li>
        </ol>
      </div>

      <div class="youtube-minimized" aria-label="YouTube player container">
        <div id="youtubePlayer"></div>
      </div>
    </section>
  </main>

  <div
    id="artworkViewer"
    class="artwork-viewer"
    role="dialog"
    aria-modal="true"
    aria-labelledby="artworkViewerTitle"
    hidden
  >
    <button id="artworkCloseBtn" class="artwork-close-btn" type="button" aria-label="Close artwork viewer">
      Close
    </button>
    <div class="artwork-viewer-frame">
      <h2 id="artworkViewerTitle" class="sr-only">WZXU RADIO artwork</h2>
      <img src="assets/wzxu-background.png" alt="Full WZXU RADIO background artwork" />
    </div>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="script.js"></script>
</body>
</html>
